front:
  text: 八識規矩補注序八識頌凡八章文略而義深乃集施頌體製兼以韻故知義彼而文從此擴充之則唯識理事無遺矣昔天親慮末學心力減而不永遂撮瑜伽之文述三十頌精擇而從略欲人之易入目曰唯識三十論後護法諸師各出所見以造釋論而纍帙積軸不勝其廣是乃欲易而反難由是諸師又各托辭理精粹者束為十卷曰成唯識暨奘三藏至自西域輒翻此論其八識頌實出於斯然而理一而言有廣略者皆因人而已蓋人之所得者或自略或自廣或由略以至廣由廣反乎略雖所入不一而所得未嘗不一也既得之則廣亦可略亦可廣略兼以之兼不以之是皆無適而不可豈學者之事乎茲為學者言之且欲從略而入此八識頌不得不作頌既出則語略而義深此又不得不加之以注為注之人不書其名往往皆抄録之本故不無三豕之訛今但義缺字訛者補而正之以自備觀覽不虞龍華金碧峯圓通常無塵聞豫輟筆過舍索稿板行之吁大法垂秋孰不泥於聲利能存是心庶不負諸大士之心也正德辛未純陽月普泰書於大興隆官舍
